services:
  recova-mcp:
    build:
      context: ../..
      dockerfile: containers/Containerfile.mcp
    command:
      - python
      - -m
      - trustgraph.mcp_server.legal_only
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --websocket-url
      - ${MCP_WEBSOCKET_URL:-ws://api-gateway:8088/api/v1/socket}
      - --auth-issuer
      - ${AUTH_ISSUER:-https://recova-mcp-lab.slit.company}
      - --auth-resource-url
      - ${AUTH_RESOURCE_URL:-https://recova-mcp-lab.slit.company/mcp}
      - --repo-root
      - /app
      - --no-loki-enabled
    environment:
      MCP_LAB_BEARER_TOKEN: ${MCP_LAB_BEARER_TOKEN:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - /app/scripts/recova_mcp/healthcheck.sh
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  caddy:
    image: caddy:2
    depends_on:
      recova-mcp:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
